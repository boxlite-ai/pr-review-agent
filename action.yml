# BoxLite PR Reviewer — composite GitHub Action.
#
# Trigger = the caller's `pull_request` workflow, or an `@boxlite review` comment.
# Compute = a BoxLite microVM on app.boxlite.ai, booted in the caller's own org with
# their key. Identity = the optional GitHub App bot. Output = one inline review, one
# sticky summary, one check run. BoxLite never custodies the caller's keys — they live in
# the caller's GitHub Secrets and reach the box per-exec.
name: 'BoxLite PR Reviewer'
description: 'Review a pull request inside a BoxLite microVM with Claude Code — inline comments, a sticky summary, and a check run.'
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  boxlite-api-key:
    description: 'BoxLite org API key (blk_live_…). The review microVM boots in — and bills to — your org.'
    required: true
  anthropic-api-key:
    description: 'Anthropic Console API key (sk-ant-api…). Provide this OR claude-code-oauth-token, not both.'
    required: false
    default: ''
  claude-code-oauth-token:
    description: 'Claude Code subscription token from `claude setup-token` (sk-ant-oat…). Alternative to anthropic-api-key.'
    required: false
    default: ''
  boxlite-url:
    description: 'BoxLite REST base URL.'
    required: false
    default: 'https://app.boxlite.ai/api'
  boxlite-image:
    description: 'Curated OCI image the review box boots from.'
    required: false
    default: 'ghcr.io/boxlite-ai/boxlite-agent-node:20260605-p0-r3'
  model:
    description: 'Explicit Claude model id. Empty = Claude Code default (tracks the latest model).'
    required: false
    default: ''
  trigger-phrase:
    description: 'Comment phrase that re-triggers a review on an issue_comment event.'
    required: false
    default: '@boxlite review'
  app-id:
    description: 'Optional GitHub App id. Set together with app-private-key to post as your branded bot.'
    required: false
    default: ''
  app-private-key:
    description: 'Optional GitHub App private key (PEM). Comments post as the App bot instead of github-actions[bot].'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    # Branded identity: mint a repo-scoped installation token from the GitHub App.
    # Skipped when app-id/app-private-key are absent → falls back to github.token.
    # The minted token is auto-masked in logs by the action.
    - name: Mint GitHub App token
      id: app-token
      if: ${{ inputs.app-id != '' && inputs.app-private-key != '' }}
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install runner dependencies
      shell: bash
      run: npm install --no-save --prefix "$GITHUB_ACTION_PATH" @boxlite-ai/boxlite@^0.9.7 yaml

    - name: Review pull request
      shell: bash
      env:
        BOXLITE_URL: ${{ inputs.boxlite-url }}
        BOXLITE_API_KEY: ${{ inputs.boxlite-api-key }}
        BOXLITE_IMAGE: ${{ inputs.boxlite-image }}
        # Exactly one is non-empty; orchestrate.mjs rejects both/neither and never
        # forwards an empty ANTHROPIC_API_KEY (which would shadow the OAuth token).
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        MODEL: ${{ inputs.model }}
        TRIGGER_PHRASE: ${{ inputs.trigger-phrase }}
        # App token when configured, else the job's github.token (github-actions[bot]).
        GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        EVENT_NAME: ${{ github.event_name }}
        REPO: ${{ github.repository }}
        # PR number from the pull_request payload, or the issue on an @mention comment.
        PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        # Present on pull_request; empty on issue_comment (orchestrate fetches the PR then).
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        BASE_REF: ${{ github.event.pull_request.base.ref }}
        COMMENT_BODY: ${{ github.event.comment.body }}
      run: node "$GITHUB_ACTION_PATH/orchestrate.mjs"
