# Copy this to .github/workflows/boxlite-review.yml in your repository.
#
# Prerequisites (repo or org settings → Secrets and variables → Actions):
#   BOXLITE_API_KEY     your app.boxlite.ai org key (blk_live_…)
#   plus ONE Claude credential:
#     ANTHROPIC_API_KEY         an Anthropic Console API key (sk-ant-api…), or
#     CLAUDE_CODE_OAUTH_TOKEN   a subscription token from `claude setup-token` (sk-ant-oat…)
#
# Optional branded bot (comments post as your GitHub App instead of
# github-actions[bot]) — add these two secrets and the `with:` lines below:
#   BOXLITE_REVIEWER_APP_ID
#   BOXLITE_REVIEWER_APP_PRIVATE_KEY
name: boxlite-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# One review per PR; a force-push cancels the in-flight run.
concurrency:
  group: boxlite-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts and bot-authored PRs.
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.user.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write # post the review comment
    steps:
      - uses: boxlite-ai/pr-review-agent@v1
        with:
          boxlite-api-key: ${{ secrets.BOXLITE_API_KEY }}
          # One of the two — a Console API key…
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # …or a Claude subscription token (remove the line above if you use this):
          # claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Uncomment for the branded bot identity:
          # app-id: ${{ secrets.BOXLITE_REVIEWER_APP_ID }}
          # app-private-key: ${{ secrets.BOXLITE_REVIEWER_APP_PRIVATE_KEY }}
