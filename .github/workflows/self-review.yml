# Dogfood: pr-review-agent reviews its own PRs with the branded bot.
# Needs 4 repo secrets: BOXLITE_API_KEY, ANTHROPIC_API_KEY (or CLAUDE_CODE_OAUTH_TOKEN),
# BOXLITE_REVIEWER_APP_ID, BOXLITE_REVIEWER_APP_PRIVATE_KEY.
# The App secrets are what make reviews post as your branded bot instead of
# github-actions[bot]. Set the trigger phrase below to your bot's @handle for a real mention.
name: self-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: self-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' &&
        !github.event.pull_request.draft &&
        github.event.pull_request.user.type != 'Bot') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@boxlite review') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          boxlite-api-key: ${{ secrets.BOXLITE_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # These two are what give you the real branded bot:
          app-id: ${{ secrets.BOXLITE_REVIEWER_APP_ID }}
          app-private-key: ${{ secrets.BOXLITE_REVIEWER_APP_PRIVATE_KEY }}
